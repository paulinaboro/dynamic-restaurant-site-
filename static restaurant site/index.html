<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Restaurant Website</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
</head>

<body>

    <div class="wrapper" id="wrapper">

        <div class="header">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#news">Menu</a></li>
                <img id="logo" src=img/logo.png>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </div>

        <div class="mainpic">

            <img id="mainpic" src=img/int5.jpg>

        </div>


        <div class="welcome">

            <h1>Welcome in our restaurant</h1>
            <p>Down below you will find our tasty menu options.
            </p>
            <p>For vegetarians: </p>
            <img id="vege" src=img/Vegetarian-Symbol.png>

        </div>

        <div class="menu_options">

            <div class="soups">Soups</div>
            <div class="maindish">Main dish</div>
            <div class="drinks">Drinks</div>
            <div class="salads">Salads</div>
            <div class="desserts">Deserts</div>
            <div class="wines">Wines</div>


        </div>
        <main></main>
        <template id="myTemplate">
        <div class="dish_descriptions">
<article>
            <div class="dish">
                <img class="productImage" src="img/small/pavlova-sm.jpg">

                <h2 class="title">Pavlova with melon <img id="vege" src=img/Vegetarian-Symbol.png></h2><h3 class="price">dkk</h3>
                <p class="shortDescription">
                    Pavlova - russiske pandekager - i honningmelon fra Nordkorea</p>
                <button class="collapsible">Read More...</button>
                <div class="content">
                    <p class="longDescription">I det nordlige Kirgisistan består en væsentlig del af kostpyramiden af forskellige kålvarianter og nødder. Mama Dushku fandt på denne ret, som en hyldest til det røde flag med hammer og segl.</p>
                </div>
            </div>
            </article>
        </div>
    </template>



        <footer>
            Welcome on the website of the restaurant XYZ.

        </footer>

    </div>
    <script src="script.js"></script>


</body>
</html>
